<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOS BOX - Sensor Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
        .table-card {
            margin-top: 20px;
        }

        .sensor-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .sensor-table th {
            text-align: left;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 12px 10px;
            border-bottom: 1px solid #2d334a;
        }

        .sensor-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #252c45;
            font-size: 0.9rem;
        }

        .battery-pill {
            display: inline-block;
            min-width: 70px;
            text-align: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            border: 1px solid;
        }

        .battery-high {
            color: #4ade80;
            border-color: #166534;
            background: rgba(22, 101, 52, 0.2);
        }

        .battery-mid {
            color: #facc15;
            border-color: #854d0e;
            background: rgba(133, 77, 14, 0.2);
        }

        .battery-low {
            color: #f87171;
            border-color: #991b1b;
            background: rgba(153, 27, 27, 0.2);
        }

        .status-line {
            color: #4ade80;
            font-size: 0.85rem;
        }

        .pagination-row {
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 0.82rem;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2><i class="fas fa-wave-square"></i> Lab Monitor</h2>
        <a class="nav-item" href="main.html"><i class="fas fa-chart-line"></i> Overview</a>
        <a class="nav-item" href="dashboard.html"><i class="fas fa-th-large"></i> DashBoard</a>
        <a class="nav-item" href="device.html"><i class="fas fa-box"></i> Devices</a>
        <a class="nav-item" href="raw-input.html"><i class="fas fa-database"></i> Raw Sensor Data</a>
        <a class="nav-item" href="senser.html"><i class="fas fa-microchip"></i> Sensor Data</a>
    </div>

    <div class="main-content">
        <div class="header-top">
            <div>
                <h1 class="m-0">Sensor Data</h1>
                <small class="page-title">Dashboard > Sensor Data</small>
            </div>
            <div class="top-actions">
                <span class="server-status-line">● Server Online</span>
                <a class="profile-link-icon" href="register.html" title="Account" data-auth-menu>
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>

        <div class="table-card">
            <div class="flex-between">
                <span><i class="fas fa-microchip"></i> Latest Sensor Readings</span>
                <span class="status-tag status-tag-blue">Real-time</span>
            </div>

            <table class="sensor-table">
                <thead>
                    <tr>
                        <th>Device ID</th>
                        <th>Battery</th>
                        <th>Speed</th>
                        <th>Altitude</th>
                        <th>GPS Accuracy</th>
                        <th>Activity</th>
                    </tr>
                </thead>
                <tbody id="sensorTableBody"></tbody>
            </table>

            <div class="pagination-row" id="sensorPagination"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-menu.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/senser.js" defer></script>
    <script src="js/nav-active.js"></script>
</body>
</html>
