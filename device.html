<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOS BOX - Devices</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/device.css" />
</head>
<body>
    <div class="sidebar">
        <h2><i class="fas fa-wave-square"></i> Lab Monitor</h2>
        <a class="nav-item" href="main.html"><i class="fas fa-chart-line"></i> Overview</a>
        <a class="nav-item" href="planing.html"><i class="fas fa-map-pin"></i> Planing</a>
        <a class="nav-item" href="dashboard.html"><i class="fas fa-th-large"></i> DashBoard</a>
        <a class="nav-item" href="device.html"><i class="fas fa-box"></i> Devices</a>
        <a class="nav-item" href="raw-input.html"><i class="fas fa-database"></i> Raw Sensor Data</a>
        <a class="nav-item" href="sensor.html"><i class="fas fa-microchip"></i> Sensor Data</a>
    </div>

    <div class="main-content">
        <div class="header-top">
            <div>
                <h1 class="m-0">Devices</h1>
                <small class="page-title">Dashboard > Devices</small>
            </div>
            <div class="top-actions">
                <span class="server-status-line">● Server Online</span>
                <a class="profile-link-icon" href="register.html" title="Account" data-auth-menu>
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card blue">
                <h4>Total Devices</h4>
                <p id="totalDevices">0</p>
            </div>
            <div class="stat-card green">
                <h4>Online</h4>
                <p id="onlineDevices">0</p>
            </div>
            <div class="stat-card orange">
                <h4>Less than half battery</h4>
                <p id="warningCount">0</p>
            </div>
            <div class="stat-card red">
                <h4>Low battery</h4>
                <p id="dangerCount">0</p>
            </div>
        </div>

        <div class="table-card">
            <div class="toolbar">
                <input class="search-input" id="searchDevice" type="text" placeholder="Search device name..." />
            </div>

            <table class="device-table">
                <thead>
                    <tr>
                        <th>Device Name</th>
                        <th>Location</th>
                        <th>Last Update</th>
                        <th>Battery</th>
                    </tr>
                </thead>
                <tbody id="deviceTableBody"></tbody>
            </table>

            <div class="pagination-row" id="devicePagination"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/auth-menu.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/device.js" defer></script>
    <script src="js/nav-active.js"></script>
</body>
</html>
