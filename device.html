<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOS BOX - Devices</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
        .table-card {
            margin-top: 20px;
        }

        .device-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .device-table th {
            text-align: left;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 12px 10px;
            border-bottom: 1px solid #2d334a;
        }

        .device-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #252c45;
            font-size: 0.92rem;
        }

        .battery-pill {
            display: inline-block;
            min-width: 68px;
            text-align: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            border: 1px solid;
        }

        .battery-high {
            color: #4ade80;
            border-color: #166534;
            background: rgba(22, 101, 52, 0.2);
        }

        .battery-mid {
            color: #facc15;
            border-color: #854d0e;
            background: rgba(133, 77, 14, 0.2);
        }

        .battery-low {
            color: #f87171;
            border-color: #991b1b;
            background: rgba(153, 27, 27, 0.2);
        }

        .action-cell {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-table {
            border: 1px solid #3a4365;
            background: #1d2540;
            color: #dbe3ff;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-table.danger {
            border-color: #7f1d2d;
            color: #fda4af;
            background: rgba(190, 24, 93, 0.15);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            max-width: 460px;
            background: #0f1426;
            border: 1px solid #2d334a;
            color: var(--text-main);
            border-radius: 8px;
            padding: 10px 12px;
            outline: none;
        }

        .btn-add {
            border: none;
            background: var(--accent-blue);
            color: white;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .status-line {
            color: #4ade80;
            font-size: 0.85rem;
        }

        .pagination-row {
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 0.82rem;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2><i class="fas fa-wave-square"></i> Lab Monitor</h2>
        <a class="nav-item" href="main.html"><i class="fas fa-chart-line"></i> Overview</a>
        <a class="nav-item" href="dashboard.html"><i class="fas fa-th-large"></i> DashBoard</a>
        <a class="nav-item" href="device.html"><i class="fas fa-box"></i> Devices</a>
        <a class="nav-item" href="raw-input.html"><i class="fas fa-database"></i> Raw Sensor Data</a>
        <a class="nav-item" href="senser.html"><i class="fas fa-microchip"></i> Sensor Data</a>
    </div>

    <div class="main-content">
        <div class="header-top">
            <div>
                <h1 class="m-0">Devices</h1>
                <small class="page-title">Dashboard > Devices</small>
            </div>
            <div class="top-actions">
                <span class="server-status-line">● Server Online</span>
                <a class="profile-link-icon" href="register.html" title="Account" data-auth-menu>
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card blue">
                <h4>Total Devices</h4>
                <p id="totalDevices">0</p>
            </div>
            <div class="stat-card green">
                <h4>Online</h4>
                <p id="onlineDevices">0</p>
            </div>
            <div class="stat-card orange">
                <h4>Warnings</h4>
                <p id="warningCount">0</p>
            </div>
            <div class="stat-card red">
                <h4>Danger Alerts</h4>
                <p id="dangerCount">0</p>
            </div>
        </div>

        <div class="table-card">
            <div class="toolbar">
                <input class="search-input" id="searchDevice" type="text" placeholder="Search device name..." />
                <button class="btn-add" id="btnAddDevice" type="button">+ Add Device</button>
            </div>

            <table class="device-table">
                <thead>
                    <tr>
                        <th>Device Name</th>
                        <th>Location</th>
                        <th>Last Update</th>
                        <th>Battery</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="deviceTableBody"></tbody>
            </table>

            <div class="pagination-row" id="devicePagination"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-menu.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/device.js" defer></script>
    <script src="js/nav-active.js"></script>
</body>
</html>
