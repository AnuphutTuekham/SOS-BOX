name: Vercel Deploy Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# ป้องกันการรัน Workflow ทับซ้อนกัน
concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

# ประกาศ Secrets ไว้ที่ระดับ Global เพื่อให้ทุก Job มองเห็นค่าเหล่านี้
env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel Secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test || echo "No tests specified"

      - name: Build Project
        run: npm run build

  vercel_deploy:
    name: Deploy and Verify Vercel
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=$( [ "${{ github.event_name }}" = "pull_request" ] && echo "preview" || echo "production" ) --token "$VERCEL_TOKEN"

      - name: Build with Vercel
        run: vercel build $( [ "${{ github.event_name }}" != "pull_request" ] && echo "--prod" ) --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          # ใช้คำสั่ง vercel deploy พร้อม --prod ถ้าไม่ใช่ PR และดึง URL ออกมา
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMAND="vercel deploy --prebuilt --yes --token $VERCEL_TOKEN"
          else
            COMMAND="vercel deploy --prebuilt --prod --yes --token $VERCEL_TOKEN"
          fi
          
          # ดึง URL โดยตรงและตัดช่องว่างออก
          DEPLOY_URL=$($COMMAND)
          echo "deployment_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed URL: $DEPLOY_URL"

      - name: Health Check Deployment
        run: |
          # ดึงค่าจาก output ของ step ที่ชื่อ 'deploy'
          URL="${{ steps.deploy.outputs.deployment_url }}"
          
          if [ -z "$URL" ]; then
            echo "Error: Deployment URL is empty!"
            exit 1
          fi
          
          echo "Checking deployment at: $URL"
          echo "Waiting for Vercel to fully provision the deployment..."
          sleep 15
          
          # ตรวจสอบ HTTP status โดยไม่ใช้ --fail เพื่อดู response
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --location \
            --retry 5 \
            --retry-delay 10 \
            --max-time 30 \
            --user-agent "Mozilla/5.0 (compatible; GitHub-Actions-Health-Check/1.0)" \
            "$URL")
          
          echo "HTTP Response Code: $HTTP_CODE"
          
          # ยอมรับ 2xx และ 3xx (redirect) เป็น success
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✓ Deployment is healthy (HTTP $HTTP_CODE)"
            exit 0
          else
            echo "✗ Deployment check failed (HTTP $HTTP_CODE)"
            echo "URL: $URL"
            # แสดง response headers เพื่อ debug
            curl -I --location --max-time 10 "$URL" || true
            exit 1
          fi

  # ส่วนแจ้งเตือนกรณี Secrets หายไป (จะทำงานเมื่อ Job ก่อนหน้า fail)
  missing_secrets_notice:
    name: Missing Vercel Secrets
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ failure() }}
    steps:
      - name: Fail notice
        run: |
          echo "Workflow failed. Please check if VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID are set in GitHub Secrets."
          exit 1