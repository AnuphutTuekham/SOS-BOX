name: Vercel Deploy Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# ป้องกันการรัน Workflow ทับซ้อนกัน
concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

# ประกาศ Secrets ไว้ที่ระดับ Global เพื่อให้ทุก Job มองเห็นค่าเหล่านี้
env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel Secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test || echo "No tests specified"

      - name: Build Project
        run: npm run build

  vercel_deploy:
    name: Deploy and Verify Vercel
    runs-on: ubuntu-latest
    needs: validate # ต้องผ่าน Job validate ก่อนถึงจะเริ่มทำส่วนนี้
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          fi

      - name: Build with Vercel
        run: vercel build --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Deploy แบบ Preview สำหรับ Pull Request
            DEPLOYMENT_URL=$(vercel deploy --prebuilt --yes --token "$VERCEL_TOKEN" | awk 'NF {line=$0} END {print line}')
          else
            # Deploy แบบ Production สำหรับการ Push ลง main
            DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN" | awk 'NF {line=$0} END {print line}')
          fi
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed URL: $DEPLOYMENT_URL"

      - name: Health Check Deployment
        run: |
          URL="${{ steps.deploy.outputs.deployment_url }}"
          echo "Checking $URL"
          # ลองเรียก URL เพื่อดูว่าหน้าเว็บใช้งานได้จริงไหม (Retry 5 ครั้ง)
          curl --fail --silent --show-error --location --retry 5 --retry-delay 3 "$URL" > /dev/null

  # ส่วนแจ้งเตือนกรณี Secrets หายไป (จะทำงานเมื่อ Job ก่อนหน้า fail)
  missing_secrets_notice:
    name: Missing Vercel Secrets
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ failure() }}
    steps:
      - name: Fail notice
        run: |
          echo "Workflow failed. Please check if VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID are set in GitHub Secrets."
          exit 1