<!doctype html>
<html lang="th">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>SOSBOX — Planing</title>
		<link rel="icon" href="favicon.svg" type="image/svg+xml" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
			integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
			crossorigin=""
		/>
		<script
			src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
			integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
			crossorigin=""
		></script>

		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css"
		/>
		<link rel="stylesheet" href="css/styles.css" />
		<link rel="stylesheet" href="css/planing.css" />
		<script
			src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"
			defer
		></script>
		<script src="config.js"></script>
		<script src="js/utils.js"></script>
		<script src="js/planing.js" defer></script>
	</head>
	<body>
		<div class="app">
			<aside class="sidebar">
				<h2><i class="fas fa-wave-square"></i> Lab Monitor</h2>
				<div class="sidebar-nav">
					<a class="nav-item" href="main.html"><i class="fas fa-chart-line"></i> Overview</a>
					<a class="nav-item" href="planing.html"><i class="fas fa-map-pin"></i> Planing</a>
					<a class="nav-item" href="dashboard.html"><i class="fas fa-th-large"></i> DashBoard</a>
					<a class="nav-item" href="device.html"><i class="fas fa-box"></i> Devices</a>
					<a class="nav-item" href="raw-input.html"><i class="fas fa-database"></i> Raw Sensor Data</a>
					<a class="nav-item" href="sensor.html"><i class="fas fa-microchip"></i> Sensor Data</a>
				</div>

				<div class="card planning-card">
					<div class="plan-mode-toggle">
						<button type="button" id="btnModePlan" class="mode-btn active"><i class="fas fa-map-pin"></i> วางหมุดแผน</button>
						<button type="button" id="btnModeMock" class="mode-btn"><i class="fas fa-box"></i> วาง Mockup กล่อง</button>
					</div>
					<div id="planNameWrap">
						<label for="planName">ชื่อหมุดแผน</label>
						<input id="planName" class="plan-input" type="text" placeholder="เช่น จุด A" maxlength="80" />
					</div>
					<div id="mockNameWrap" style="display:none">
						<label for="mockBoxName">ชื่อกล่อง Mockup</label>
						<input id="mockBoxName" class="plan-input" type="text" placeholder="เช่น BOX-TEST-1" maxlength="80" />
					</div>

				<div class="card planning-card">
					<label>รายการ SOS BOX</label>
					<div class="list" id="planningBoxList"></div>
				</div>

				<div class="card planning-card">
					<label>รายการ Mockup กล่อง</label>
					<div class="list" id="mockBoxList"></div>
				</div>

				<div class="card planning-card">
					<label>รายการหมุดแผน</label>
					<div class="list" id="planList"></div>
				</div>
			</aside>

			<main class="mapWrap">
				<div id="map" role="application" aria-label="Planning map"></div>
				<div class="toast" id="toast"></div>
			</main>
		</div>

		<script src="js/nav-active.js"></script>
	</body>
</html>
