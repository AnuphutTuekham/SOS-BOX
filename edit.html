<!doctype html>
<html lang="th">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>SOSBOX — แก้ไข / เพิ่ม SOS BOX</title>
		<link rel="icon" href="favicon.svg" type="image/svg+xml" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

		<!-- Leaflet (OpenStreetMap) -->
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
			integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
			crossorigin=""
		/>
		<script
			src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
			integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
			crossorigin=""
		></script>

		<!-- Geocoder control (Nominatim) -->
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css"
		/>
		<link rel="stylesheet" href="css/styles.css" />
		<script
			src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"
			defer
		></script>
		<script src="config.js"></script>
		<script src="js/utils.js"></script>
		<script src="js/auth.js"></script>
		<script src="js/auth-guard.js"></script>
		<script src="js/editor.js" defer></script>
	</head>
	<body>
		<div class="app">
			<aside class="sidebar">
				<h2><i class="fas fa-wave-square"></i> Lab Monitor</h2>
				<div class="sidebar-nav">
					<a class="nav-item" href="main.html"><i class="fas fa-chart-line"></i> Overview</a>
					<a class="nav-item" href="dashboard.html"><i class="fas fa-th-large"></i> DashBoard</a>
					<a class="nav-item" href="device.html"><i class="fas fa-box"></i> Devices</a>
					<a class="nav-item" href="raw-input.html"><i class="fas fa-database"></i> Raw Sensor Data</a>
					<a class="nav-item" href="sensor.html"><i class="fas fa-microchip"></i> Sensor Data</a>
				</div>

				<div class="card">
					<div class="flex-between items-center gap-10">
						<span id="modeText" style="font-size:13px;color:var(--muted)">โหมด: เพิ่มรายการใหม่</span>
					</div>

					<div class="spacer-10"></div>

					<input type="hidden" id="selectedId" value="" />

					<div class="row">
						<div>
							<label>Latitude</label>
							<input type="number" id="lat" step="any" placeholder="13.7563" />
						</div>
						<div>
							<label>Longitude</label>
							<input type="number" id="lng" step="any" placeholder="100.5018" />
						</div>
					</div>

					<div class="mt-8">
						<label>ชื่อ SOS BOX</label>
						<input type="text" id="name" placeholder="SOS BOX 001" />
					</div>

					<div class="mt-8">
						<label>หมายเหตุ</label>
						<textarea id="note" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
					</div>

					<div class="mt-8">
						<!-- max=150: system supports overcharge readings up to 150% (clamped in utils.js) -->
						<label>แบตเตอรี่ (%)</label>
						<input type="number" id="battery" min="0" max="150" step="1" value="100" />
						<div class="battery-preview">
							<img id="batteryPreview" class="batteryIcon" src="" alt="battery icon" />
							<span id="batteryPreviewText" style="font-size:12px;color:var(--muted)"></span>
						</div>
					</div>

					<div class="row mt-8">
						<div>
							<label>Power Bank (mAh)</label>
							<input type="number" id="powerbankMah" min="0" max="1000000" step="100" value="10000" />
						</div>
						<div>
							<label>โหลด (W)</label>
							<input type="number" id="loadW" min="0.1" max="1000" step="0.1" value="5" />
						</div>
					</div>

					<div class="mt-8">
						<label>จำนวน WiFi</label>
						<input type="number" id="wifiCount" min="0" max="100000" step="1" value="0" />
					</div>

					<div class="mt-8">
						<label>Last Seen</label>
						<input type="text" id="lastSeen" readonly value="-" />
					</div>

					<div class="btns mt-10">
						<button class="primary" id="btnSave" type="button"><i class="fas fa-save"></i> บันทึก</button>
						<button id="btnSeenNow" type="button"><i class="fas fa-clock"></i> Seen Now</button>
						<button id="btnNew" type="button"><i class="fas fa-plus"></i> ใหม่</button>
						<button class="danger" id="btnDelete" type="button"><i class="fas fa-trash"></i> ลบ</button>
					</div>

					<div class="btns mt-8">
						<button id="btnLocate" type="button"><i class="fas fa-location-crosshairs"></i> ตำแหน่งฉัน</button>
						<button id="btnCopyLatLng" type="button"><i class="fas fa-copy"></i> คัดลอกพิกัด</button>
						<button id="btnBack" type="button"><i class="fas fa-arrow-left"></i> ย้อนกลับ</button>
					</div>
				</div>

				<div data-testid="group-info" style="display:none">67022995</div>
			</aside>

			<main class="mapWrap">
				<div id="map" role="application" aria-label="Interactive map for selecting device location"></div>
				<div class="toast" id="toast"></div>
			</main>
		</div>

		<script src="js/nav-active.js"></script>
	</body>
</html>
